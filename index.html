<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Blind Test Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Color Blind Test</h1>
  <p>Find the different color!</p>
  <p>Score: <span id="score">0</span></p>
  <p>Level: <span id="level">1</span></p>
  <p>Time Left: <span id="timer">0</span>s</p>

  <button id="startBtn" type="button">Start Game</button>

  <div id="gameArea"></div>

  <script src="script.js" defer></script>
</body>
</html>
